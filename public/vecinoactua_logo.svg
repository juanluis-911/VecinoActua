<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="VecinoActúa">
  <!-- Icon: Map pin + speech bubble hybrid -->
  <g transform="translate(0, 0)">
    <!-- Speech bubble / map pin base (blue) -->
    <path d="M44 8 C22 8 8 22 8 42 C8 60 18 74 34 82 L44 96 L54 82 C70 74 80 60 80 42 C80 22 66 8 44 8Z" fill="#2D9CDB"/>
    <!-- Inner white circle -->
    <circle cx="44" cy="42" r="22" fill="white" opacity="0.15"/>
    <!-- Checkmark -->
    <path d="M30 42 L40 52 L60 30" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Community dots (bottom) -->
    <circle cx="30" cy="102" r="5" fill="#FF5A5F"/>
    <circle cx="44" cy="108" r="5" fill="#FF5A5F"/>
    <circle cx="58" cy="102" r="5" fill="#FF5A5F"/>
  </g>

  <!-- Wordmark -->
  <text
    x="100"
    y="72"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
  >
    <tspan fill="#2D9CDB">Vecino</tspan><tspan fill="#FF5A5F">Actúa</tspan>
  </text>
</svg>
